mlCore:
  artifactURIs:
    dockerImage: docker.io/ultralytics/ultralytics
    model: https://github.com/ultralytics/assets/releases (pretrained YOLO weights such as yolo26n.pt, yolo26x.pt)
  baselines:
    - >-
      Internal model_data.py compares YOLO26 and YOLO11 against prior YOLO families (YOLOv3, YOLOv5, YOLOv6, YOLOv7,
      YOLOv8, YOLOv9, YOLOv10), other detectors such as PP-YOLOE+, DAMO-YOLO, YOLOX, RTDETRv2/v3, EfficientDet,
      Gold-YOLO, D-FINE, RTMDet, YOLO-NAS, FCOS, SSD, LW-DETR, and YOLO-World, with standardized mAP, latency,
      parameter, and FLOPs metrics.
    - >-
      These baselines provide reference performance for common COCO-style detection settings at 640×640 resolution and
      various model scales (n/s/m/l/x).
  datasets:
    - license: See the COCO dataset license on the official site.
      name: COCO (val2017, train2017)
      uri: https://docs.ultralytics.com/datasets/detect/coco/
    - license: See the COCO dataset license on the official site.
      name: COCO-Seg (instance segmentation)
      uri: https://docs.ultralytics.com/datasets/segment/coco/
    - license: See the COCO Keypoints dataset license on the official site.
      name: COCO Keypoints / COCO-Pose
      uri: https://docs.ultralytics.com/datasets/pose/coco/
    - license: See the DOTA dataset license on the official site.
      name: DOTAv1 (Oriented Object Detection)
      uri: https://docs.ultralytics.com/datasets/obb/dota-v2/
    - license: See the ImageNet dataset license on the official site.
      name: ImageNet (classification)
      uri: https://docs.ultralytics.com/datasets/classify/imagenet/
    - license: Derived subsets of COCO; inherit COCO licensing.
      name: COCO8 / COCO128 mini datasets
      uri: https://docs.ultralytics.com/datasets/detect/coco/
  failureModes:
    - >-
      Performance degradation on domains and objects that differ significantly from the training datasets (e.g., COCO,
      DOTAv1, ImageNet) without appropriate fine-tuning or domain adaptation.
    - >-
      Lower accuracy on very small, heavily occluded, or motion-blurred objects, especially at low input resolutions or
      aggressive post-processing thresholds (conf/iou).
    - >-
      Potential misalignment between exported model behavior and PyTorch reference behavior if export options (dynamic
      shapes, NMS-in-graph, INT8/FP16 quantization) are misconfigured or unsupported by the deployment runtime.
    - >-
      Tracking-specific failure modes such as ID switches, track fragmentation, or missed tracks in highly crowded or
      low-frame-rate video inputs.
  features:
    - >-
      Unified support for multiple computer vision tasks: object detection, instance segmentation, classification, human
      pose estimation, oriented bounding box detection, and multi-object tracking.
    - >-
      Config-driven training, validation, and hyperparameter tuning with automatic device selection, mixed precision
      support, and distributed training support.
    - >-
      Rich data augmentation strategies including mosaic, MixUp, CutMix, Albumentations integration,
      classification-specific augmentations, and grayscale/multispectral support.
    - >-
      Export to many deployment targets (TorchScript, ONNX, OpenVINO, TensorRT, TFLite, NCNN, MNN, IMX, ExecuTorch,
      Axelera, RKNN, CoreML, TF.js, EdgeTPU) through a single `yolo export` command.
    - >-
      High-level, ready-to-use solutions for counting, heatmaps, speed estimation, queue and parking management,
      similarity search, and security alarm workflows.
  problem: >-
    Supervised computer vision for images and videos, focusing on object detection, instance segmentation, image
    classification, keypoint-based human pose estimation, oriented bounding box detection, and multi-object tracking.
  qualities: []
  training:
    framework: PyTorch
    frameworkVersion: '2000-01-08T00:00:00.000Z'
    hardware: >-
      Training and benchmarking demonstrated on NVIDIA GPUs (e.g., Amazon EC2 P4d with TensorRT T4 latency reports) and
      CPU-only environments; supports Linux, macOS, and Windows.
    hyperparams:
      augmentations: mosaic, MixUp, CutMix, hsv, flip, scale, translate
      batch: 16
      conf: 0.25
      epochs: 100
      imgsz: 640
      iou: 0.45
      optimizer: SGD or AdamW (configurable)
      taskSpecific: task=detect|segment|classify|pose|obb
