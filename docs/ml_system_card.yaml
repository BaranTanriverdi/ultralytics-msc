business:
  executiveSummary: >-
    Ultralytics YOLO is an open-source computer vision framework and model zoo that provides state-of-the-art
    YOLO-family models (including the latest YOLO26) for object detection, tracking, instance segmentation,
    classification, pose estimation, and oriented bounding box detection. The library is distributed as a Python package
    and Docker images, with a unified CLI (`yolo`) and Python API (`ultralytics.YOLO`) for training, validation,
    prediction, and export across many hardware and deployment targets. Pretrained models are provided for standard
    benchmarks such as COCO, ImageNet, COCO Keypoints, COCO-Seg, and DOTAv1, with detailed accuracy and latency metrics.
    The project is backed by extensive documentation, examples, and integrations with experiment tracking and deployment
    tools, targeting both individual researchers and enterprise users via AGPL-3.0 and commercial licenses.
  hazardousUseCases:
    - >-
      Using YOLO models as the sole decision-maker in safety-critical systems such as autonomous driving, industrial
      control, or medical devices without additional validation, redundancies, or human oversight.
    - >-
      Deploying YOLO-based systems for mass surveillance, biometric identification, or tracking of individuals in ways
      that may infringe on privacy rights or violate local regulations.
    - >-
      Relying on YOLO detections for legally binding decisions (e.g., law enforcement, access control, or credit
      decisions) without appropriate governance, auditing, and fairness assessments.
  intendedUse: >-
    The library is intended to be used by developers, researchers, and organizations to train, evaluate, and deploy
    YOLO-based models for computer vision tasks such as object detection, instance segmentation, multi-object tracking,
    human pose estimation, classification, and oriented bounding box detection on images and videos. Typical uses
    include analytics, counting, monitoring, region-based analytics, heatmaps, and other vision solutions implemented
    via the built-in `solutions` module and CLI.
  kpis:
    - current: 57.5
      name: COCO val2017 detection mAP50-95 for YOLO26x
      target: 57.5
    - current: 47
      name: COCO-Seg val2017 mask mAP50-95 for YOLO26x-seg
      target: 47
    - current: 79.9
      name: ImageNet top-1 accuracy for YOLO26x-cls
      target: 79.9
  nonGoals: []
  outOfScopeUse:
    - General-purpose natural language processing or non-vision ML tasks that are unrelated to image or video data.
    - >-
      Applications that require formal guarantees of fairness, robustness, or certification (e.g., regulated medical
      diagnostics) without additional domain-specific validation and certification outside this library.
  userPopulations:
    - >-
      Students, researchers, and enthusiasts using the AGPL-3.0 licensed package for open research and educational
      projects.
    - Applied ML and software engineers integrating YOLO models into analytics, monitoring, and vision-powered products.
    - Enterprise teams deploying Ultralytics models commercially under the Ultralytics Enterprise License.
devInsight:
  architecture:
    dataFlow:
      - >-
        User specifies a dataset configuration (e.g., coco.yaml, coco8.yaml) that defines image and label locations and
        metadata.
      - >-
        Images and labels are loaded via BaseDataset/YOLODataset in ultralytics.data.base and ultralytics.data.dataset,
        with caching and rectangular batching optionally enabled.
      - >-
        Data augmentations and transforms (e.g., mosaic, MixUp, CutMix, color and geometric transforms) are applied in
        ultralytics.data.augment, yielding batches of images plus bounding boxes, segments, and keypoints.
      - >-
        Batches are fed through model architectures defined in ultralytics.models.* (YOLO26/YOLOv8/YOLOv10, RT-DETR,
        SAM, etc.) using PyTorch, via training/validation loops in ultralytics.engine.trainer and
        ultralytics.engine.validator.
      - >-
        Training and evaluation metrics (e.g., mAP, accuracy, keypoint AP) are computed via ultralytics.utils.metrics
        and logged to console and optional integrations (TensorBoard, Weights & Biases, MLflow).
      - >-
        Trained weights and exported artifacts (TorchScript, ONNX, OpenVINO, TensorRT, TFLite, NCNN, etc.) are produced
        via ultralytics.engine.exporter and ultralytics.utils.export, and can be consumed via the CLI (`yolo predict`,
        `yolo track`) or Python API (`YOLO(...).predict`, `.track`, `.export`).
    depsSummary:
      - >-
        Core training and inference depend on PyTorch (torch>=1.8.0) and torchvision for model definition and tensor
        operations.
      - Numerical computation and data handling rely on numpy, scipy, and polars.
      - Image and video I/O and visualization depend on opencv-python, pillow, and matplotlib.
      - >-
        Export and deployment integrations use optional dependencies such as onnx, onnxruntime, openvino,
        tensorflow/tfjs, TensorRT, MNN, NCNN, CoreML, and others declared in the `export` optional dependency group.
      - >-
        Experiment tracking and observability integrate with Weights & Biases, MLflow, TensorBoard, ClearML, Neptune,
        and DVC via optional `logging` dependencies.
      - >-
        The library is packaged as a Python project with setuptools, targeting Python>=3.8 across Linux, macOS, and
        Windows.
    publicApis:
      - file: ultralytics/cfg/__init__.py
        name: YOLO CLI entrypoint
        path: >-
          yolo [task] [mode] [args...] (e.g., `yolo detect train`, `yolo predict`, `yolo export`, `yolo track`, `yolo
          solutions ...`)
      - file: ultralytics/__init__.py
        name: Python model API
        path: ultralytics.YOLO(...).train()/val()/predict()/track()/export()
      - file: ultralytics/__init__.py
        name: Python RT-DETR API
        path: ultralytics.RTDETR(...).train()/val()/predict()/export()
      - file: ultralytics/cfg/__init__.py
        name: Ultralytics Solutions CLI
        path: yolo solutions [count|heatmap|queue|workout|analytics|... ] arg=value ...
  codeOverview:
    components:
      - keyFiles:
          - ultralytics/models/yolo/model.py
          - ultralytics/cfg/models/26/yolo26.yaml
          - ultralytics/models/rtdetr/model.py
          - ultralytics/models/sam/model.py
        name: Model architectures
        summary: >-
          Implementations of YOLO family models (YOLO26, YOLO11, YOLOv8–v10, YOLO-World, YOLOE), RT-DETR, SAM/FastSAM,
          and related heads and backbones.
      - keyFiles:
          - ultralytics/engine/trainer.py
          - ultralytics/engine/validator.py
          - ultralytics/engine/predictor.py
          - ultralytics/engine/exporter.py
          - ultralytics/engine/tuner.py
        name: Training and evaluation engine
        summary: Config-driven training, validation, prediction, export, and hyperparameter tuning loops with callback support.
      - keyFiles:
          - ultralytics/data/base.py
          - ultralytics/data/dataset.py
          - ultralytics/data/augment.py
          - ultralytics/data/build.py
          - ultralytics/data/converter.py
        name: Data pipeline
        summary: >-
          Dataset definitions, loaders, augmentation, dataset conversion utilities, and dataset splitting for multiple
          tasks and formats.
      - keyFiles:
          - ultralytics/trackers/bot_sort.py
          - ultralytics/trackers/byte_tracker.py
          - ultralytics/trackers/track.py
          - ultralytics/solutions/object_counter.py
          - ultralytics/solutions/heatmap.py
          - ultralytics/solutions/queue_management.py
        name: Tracking and video analytics
        summary: >-
          Multi-object trackers (BoT-SORT, ByteTrack) and high-level analytics solutions for counting, heatmaps, queue
          management, parking, and speed estimation.
      - keyFiles:
          - ultralytics/engine/exporter.py
          - ultralytics/utils/export/engine.py
          - ultralytics/utils/export/tensorflow.py
          - ultralytics/utils/export/imx.py
          - docs/en/integrations/*.md
        name: Integrations and exports
        summary: >-
          Support for exporting models to ONNX, OpenVINO, TensorRT, CoreML, TFLite, MNN, NCNN, IMX, ExecuTorch, Axelera,
          and interacting with Triton, SAHI, and various runtimes.
    entrypoints:
      - >-
        Command-line interface via the `yolo` and `ultralytics` console scripts defined in pyproject.toml, implemented
        in ultralytics.cfg.entrypoint.
      - >-
        Python API entrypoint through the `ultralytics` package, exposing model classes such as YOLO, YOLOWorld, YOLOE,
        NAS, SAM, FastSAM, and RTDETR from ultralytics.__init__.
      - High-level solutions entrypoint via `yolo solutions ...` which dispatches to classes in ultralytics.solutions.*.
      - >-
        Documentation build entrypoint via docs/build_docs.py and docs/build_reference.py for generating and
        post-processing MkDocs-based documentation.
    languages:
      - Python (core library, CLI, training and inference engine, data pipeline, integrations, tests).
      - C++ (inference examples for ONNX Runtime, OpenVINO, TensorRT, LibTorch, MNN).
      - Rust (ONNX Runtime demos for YOLO series).
  qualitySignals:
    complexityHints:
      - >-
        The data augmentation pipeline in ultralytics.data.augment.py is large and feature-rich (mosaic, MixUp, CutMix,
        perspective transforms, classification augmentations), indicating a complex area where subtle changes may impact
        model performance.
      - >-
        The exporter and multi-backend support in ultralytics.engine.exporter and ultralytics/utils/export/* handle many
        target formats and edge cases (dynamic shapes, INT8/FP16, NMS-on-graph), making them important but intricate
        components.
      - >-
        Tracking and solutions modules (ultralytics.trackers.*, ultralytics.solutions.*) combine model inference,
        multi-object tracking, and custom business logic (e.g., counting, speed estimation, queue analytics), which
        increases integration complexity compared to pure model code.
    todoHotspots: []
  runtimePerf:
    cls_yolo26_imagenet_val:
