integration:
  api:
    inputSchema: >-
      For the CLI: `yolo [task] [mode] model=path/to/model.pt data=path/to/data.yaml source=PATH_OR_URL imgsz=INT ...`.
      For the Python API: `YOLO('model.pt').train(data='data.yaml', epochs=int, imgsz=int, device='cpu|cuda', **kwargs)`
      and `YOLO('model.pt')(source, imgsz=int, conf=float, iou=float, stream=bool, **kwargs)` where `source` may be file
      paths, URLs, numpy arrays, PIL Images, or torch.Tensors.
    outputSchema: >-
      CLI commands write metrics to stdout and optionally files (runs/* directories), prediction images/videos, exported
      model artifacts, labels, and JSON/CSV metrics. Python API calls return `Results` objects (defined in
      ultralytics.engine.results.Results) containing boxes, masks, keypoints, classification scores, and helper methods
      (`plot`, `to_df`, `to_json`, `save_txt`, `save_crop`).
    version: 8.4.18
  driftSignals: []
  errorModel: []
  fallbacks:
    - >-
      If CUDA is unavailable or misconfigured, the library automatically falls back to CPU execution, as seen in tests
      that branch on CUDA availability and use `device='cpu'`.
    - >-
      For export formats or runtimes that are unsupported in a given environment (e.g., CoreML on non-macOS,
      TensorFlow/TFLite on certain platforms), tests are conditionally skipped and requirements are checked at runtime,
      signalling to users that a different deployment path or environment is needed.
    - >-
      When data caching to RAM or disk is not possible due to resource limits, the data loader gracefully disables
      caching with informative warnings instead of failing hard.
  observability: []
  operationalQualities: []
